# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you: 
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: m-julian
email: your-email@example.com
description: >- # this means to ignore newlines until "baseurl:"
  Work in progress blog of m-julian. Notes on topics like machine learning and quantum mechanics, including code samples in Python.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://m-julian.github.io/" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: ""
github_username:  m-julian

# Build settings
theme: minima # not really used as I have modified _includes/layouts, etc.
plugins:
  - jekyll-feed

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/




### OWN CONFIG FOR COLLECTIONS
# COLLECTIONS ARE FOUND IN /collections/ directory

# see https://jekyllrb.com/docs/collections/ for collections
collections_dir: collections

collections:
  # define a notebook collections (directory needs to begin with underscore eg. _notebooks)
  notebooks:
    output: true # needs to be here in order for Jekyll to write collection to file
    permalink: /:collection/:year/:title:output_ext

# defaults for Jekyll frontmatter at the top of a .html file that is going to be on the website
defaults:
  -
    scope:
      path: "/collections/_notebooks/"
    values:
      layout: "notebook"
      image: "/assets/images/default_image.png" # display white if there is no image

  -
    scope:
      path: "/collections/_projects/"
      # type: "posts" # previously `page` in Jekyll 2.2.
    values:
      layout: "project"
      image: "/assets/images/default_image.png"